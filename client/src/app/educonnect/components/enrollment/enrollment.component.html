<div class="form-container">
    <h2>Create New Enrollment</h2>
    <form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="course">Select Course</label>
            <select id="course" formControlName="course">
                <option value="">-- Choose a Course --</option>
                <option *ngFor="let course of courses" [ngValue]="course">
                    {{ course.courseName }}
                </option>
            </select>
        </div>

        <div *ngIf="role === 'TEACHER'" class="form-group">
            <label for="student">Assign to Student</label>
            <select id="student" formControlName="student">
                <option value="">-- Choose a Student --</option>
                <option *ngFor="let student of students" [ngValue]="student">
                    {{ student.fullName }}
                </option>
            </select>
        </div>

        <div *ngIf="role === 'STUDENT'" class="form-group">
            <label for="student">Student Name (Auto-filled)</label>
            <input type="text" id="student" formControlName="student" [readonly]="true" class="readonly-input" />
        </div>

        <div class="form-group">
            <label for="enrollmentDate">Enrollment Date</label>
            <input type="date" id="enrollmentDate" formControlName="enrollmentDate" />
            <div *ngIf="enrollmentForm.get('enrollmentDate')?.invalid && enrollmentForm.get('enrollmentDate')?.touched" class="error">
                Enrollment Date is required.
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" [disabled]="enrollmentForm.invalid">Complete Enrollment</button>
        </div>
        
        <div class="form-footer">
            <a routerLink="/educonnect">← Back to Dashboard</a>
        </div>

        <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    </form>
</div>
