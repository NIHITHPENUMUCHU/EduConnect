<app-navbar></app-navbar>
<div class="page-wrapper">
    <div class="form-card">
        <h2 class="form-title">Create New Enrollment</h2>
        <form [formGroup]="enrollmentForm" (ngSubmit)="onSubmit()">

            <div class="form-group">
                <label class="form-label" for="course">Select Course</label>
                <select class="form-input" id="course" formControlName="course">
                    <option value="">-- Choose a Course --</option>
                    <option *ngFor="let course of courses" [ngValue]="course">
                        {{course.courseName}}
                    </option>
                </select>
            </div>

            <div *ngIf="role==='TEACHER'" class="form-group">
                <label class="form-label" for="student">Assign to Student</label>
                <select class="form-input" id="student" formControlName="student">
                    <option value="">-- Choose a Student --</option>
                    <option *ngFor="let student of students" [ngValue]="student">
                        {{student.fullName}}
                    </option>
                </select>
            </div>

            <div *ngIf="role==='STUDENT'" class="form-group">
                <label class="form-label" for="student">Student Name (Auto-filled)</label>
                <input class="form-input readonly-input" type="text" id="student" formControlName="student"
                    [readonly]="true" />
            </div>

            <div class="form-group">
                <label class="form-label" for="enrollmentDate">Enrollment Date</label>
                <input class="form-input" type="date" id="enrollmentDate" formControlName="enrollmentDate" />
                <div *ngIf="enrollmentForm.get('enrollmentDate')?.invalid&&enrollmentForm.get('enrollmentDate')?.touched"
                    class="error-text">
                    Enrollment Date is required.
                </div>
            </div>

            <button class="btn-submit" type="submit" [disabled]="enrollmentForm.invalid">Complete Enrollment</button>

            <div class="form-footer">
                <a routerLink="/educonnect">← Back to Dashboard</a>
            </div>

            <div *ngIf="successMessage" class="alert-success">{{successMessage}}</div>
            <div *ngIf="errorMessage" class="alert-error">{{errorMessage}}</div>

        </form>
    </div>
</div>
