<div class="form-container">
    <form [formGroup]="studentForm" (ngSubmit)="onSubmit()">
        <h2>Register New Student</h2>

        <div class="form-group">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" formControlName="fullName" placeholder="e.g. Jane Doe" />
            <div class="error" *ngIf="studentForm.get('fullName')?.invalid && studentForm.get('fullName')?.touched">
                Full Name is required and must have at least 2 characters.
            </div>
        </div>

        <div class="form-group">
            <label for="dateOfBirth">Date of Birth</label>
            <input type="date" id="dateOfBirth" formControlName="dateOfBirth" />
            <div class="error" *ngIf="studentForm.get('dateOfBirth')?.invalid && studentForm.get('dateOfBirth')?.touched">
                Date of Birth is required.
            </div>
        </div>

        <div class="form-group">
            <label for="contactNumber">Contact Number</label>
            <input type="text" id="contactNumber" formControlName="contactNumber" placeholder="10-digit mobile number" />
            <div class="error" *ngIf="studentForm.get('contactNumber')?.invalid && studentForm.get('contactNumber')?.touched">
                Contact Number must be a 10-digit valid number.
            </div>
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" formControlName="email" placeholder="jane@example.com" />
            <div class="error" *ngIf="studentForm.get('email')?.invalid && studentForm.get('email')?.touched">
                Please provide a valid email address.
            </div>
        </div>

        <div class="form-group">
            <label for="address">Home Address</label>
            <textarea id="address" formControlName="address" placeholder="Enter full address..."></textarea>
            <div class="error" *ngIf="studentForm.get('address')?.invalid && studentForm.get('address')?.touched">
                Address must have at least 5 characters.
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" [disabled]="studentForm.invalid">Create Student Profile</button>
        </div>
        
        <div class="form-footer">
            <a routerLink="/educonnect">← Back to Dashboard</a>
        </div>

        <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    </form>
</div>
