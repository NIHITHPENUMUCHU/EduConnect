<div class="form-container">
    <h2>Create a New Course</h2>
    <form [formGroup]="courseForm" (ngSubmit)="onSubmit()">
        <div class="form-group">
            <label for="courseName">Course Title</label>
            <input type="text" id="courseName" formControlName="courseName" placeholder="e.g. Introduction to Physics" />
            <div *ngIf="courseForm.get('courseName')?.invalid && courseForm.get('courseName')?.touched" class="error">
                Course Name is required.
            </div>
        </div>

        <div class="form-group">
            <label for="description">Course Description</label>
            <textarea id="description" formControlName="description" placeholder="Briefly describe what students will learn..."></textarea>
            <div *ngIf="courseForm.get('description')?.invalid && courseForm.get('description')?.touched" class="error">
                Description must be less than 500 characters.
            </div>
        </div>

        <div class="form-group">
            <label for="teacher">Instructor Name</label>
            <input type="text" id="teacher" formControlName="teacher" [readonly]="true" class="readonly-input" />
        </div>

        <div class="form-actions">
            <button type="submit" [disabled]="courseForm.invalid">Publish Course</button>
        </div>

        <div class="form-footer">
            <a routerLink="/educonnect">← Back to Dashboard</a>
        </div>

        <div *ngIf="successMessage" class="success-message">{{ successMessage }}</div>
        <div *ngIf="errorMessage" class="error-message">{{ errorMessage }}</div>
    </form>
</div>
