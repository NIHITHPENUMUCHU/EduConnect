<header class="modern-navbar">
    <div class="nav-container">

        <div class="nav-brand">
            <a routerLink="/educonnect" class="brand-link">
                <svg class="app-logo" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 3L3 10.5L18 18L33 10.5L18 3Z" fill="url(#logo-gradient)" />
                    <path d="M3 10.5V25.5L18 33V18L3 10.5Z" fill="#4338ca" />

                        <linearGradient id="logo-gradient" x1="0%" y1="0%" x2="100%" y2="100%">

                    <a routerLink="/educonnect/enrollment" routerLinkActive="active" class="nav-link">

            </ul>
