<div class="page-wrapper">
    <div class="form-card">
        <h2 class="form-title">Welcome Back</h2>
        
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
                <label class="form-label" for="username">Username</label>
                <input class="form-input" type="text" id="username" formControlName="username" placeholder="Enter your username" />
                <div *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched" class="error-text">
                    Username is required.
                </div>
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-input" type="password" id="password" formControlName="password" placeholder="Enter your password" />
                <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-text">
                    Password is required.
                </div>
            </div>

            <button class="btn-submit" type="submit" [disabled]="loginForm.invalid">Sign In</button>
            
            <div class="form-footer">
                Don't have an account? <a routerLink="/auth/register" class="footer-link">Register here</a>
            </div>

            <div *ngIf="errorMessage" class="alert-error">
                {{ errorMessage }}
            </div>
        </form>
    </div>
</div>
